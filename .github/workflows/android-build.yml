name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Brand New Solution
      run: |
        rm -rf *.sln *.slnx
        echo 'Microsoft Visual Studio Solution File, Format Version 12.00' > ServerBuild.sln
        find . -name "*.csproj" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          dotnet sln ServerBuild.sln add "$project"
        done
        
    - name: Dynamically Inject All Project References to Startup
      run: |
        sed -i '/<\/Project>/i \  <ItemGroup>' Startup/MUnique.OpenMU.Startup.csproj
        find . -name "*.csproj" ! -path "*/Startup/*" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          clean_path=$(echo "$project" | sed 's|^\./||')
          sed -i "/<\/Project>/i \    <ProjectReference Include=\"../$clean_path\" />" Startup/MUnique.OpenMU.Startup.csproj
        done
        sed -i '/<\/Project>/i \  </ItemGroup>' Startup/MUnique.OpenMU.Startup.csproj

    - name: Restore and Compile Server
      run: |
        # 1. Khôi phục gói NuGet và ép hệ thống không được dừng lại dù có lỗi xung đột phiên bản
        dotnet restore ServerBuild.sln -p:NuGetAudit=false -p:AuditLevel=none || true
        
        # 2. Loại bỏ --no-restore để trình publish tự động phân giải cấu trúc và nạp gói trực tiếp khi biên dịch
        dotnet publish ServerBuild.sln \
          -c Release \
          -o ./ServerOut/ \
          -p:GenerateAssemblyInfo=false \
          -p:Deterministic=false \
          -p:TreatWarningsAsErrors=false \
          -p:MSBuildWarningsAsErrors=false \
          -p:NuGetAudit=false \
          -p:AuditLevel=none \
          --no-warn:NU1901,NU1902,NU1903,NU1904
