name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      - name: Patch Gradle and NDK Configurations
        run: |
          # 1. Tìm chính xác thư mục chứa dự án Android
          cd android/ || cd */android/ || true
          
          # 2. Khóa vị trí file local.properties bằng đường dẫn SDK chuẩn
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # 3. Sử dụng lệnh sed để xóa dòng ndkVersion ép buộc cũ trong file build.gradle (hoặc app/build.gradle)
          find . -name "build.gradle" -exec sed -i '/ndkVersion/d' {} +
          
          echo "=== ĐÃ XOÁ BỎ DÒNG NDKVERSION CŨ ĐỂ ĐỒNG BỘ HỆ THỐNG ==="

      - name: Build Android APK via Local Wrapper
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Thực hiện dọn dẹp bộ đệm lỗi cũ và tiến hành biên dịch dứt điểm sang file APK
          ./gradlew clean assembleRelease -x test --continue --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
