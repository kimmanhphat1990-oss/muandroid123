name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    # Quay lại hệ điều hành mới nhất để GitHub Actions không bắt bạn phải xếp hàng đợi (Queued) nữa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          # Giữ nguyên Java 11 để đọc hiểu cấu trúc code game cũ của bạn
          java-version: '11'

      - name: Build Android APK via Local Wrapper
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Thực hiện dọn dẹp bộ đệm lỗi cũ và biên dịch trực tiếp thông qua Wrapper nội bộ của game
          ./gradlew clean assembleRelease -x test --continue --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
