name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Solution and Compile
      run: |
        dotnet new sln
        dotnet sln $(ls *.sln | head -n 1) add $(find . -name "*.csproj")
        dotnet publish $(ls *.sln | head -n 1) -c Release -o ./ServerOut/ -p:GenerateAssemblyInfo=false -p:Deterministic=false
