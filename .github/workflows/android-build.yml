name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Brand New Solution
      run: |
        # 1. Tạo tệp giải pháp ngay tại thư mục gốc (không dùng tham số -n để tránh bị tự tạo thư mục con)
        dotnet new sln --force
        
        # 2. Quét động và nạp chính xác các phân hệ (Sử dụng ký tự đại diện *.sln để tự nhận diện tên file)
        find . -name "*.csproj" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          echo "Mapping project: $project"
          dotnet sln *.sln add "$project"
        done
    - name: Restore and Compile Server
      run: |
        dotnet restore *.sln
        dotnet publish *.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
