name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Brand New Solution
      run: |
        # 1. Tạo tệp giải pháp hoàn toàn mới để tránh xung đột file cũ hỏng
        dotnet new sln -n OpenMU.AndroidServer
        
        # 2. Quét động và nạp chính xác các phân hệ (Loại bỏ hoàn toàn ChatServer và Backup)
        find . -name "*.csproj" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          echo "Mapping project: $project"
          dotnet sln OpenMU.AndroidServer.sln add "$project"
        done
    - name: Restore and Compile Server
      run: |
        dotnet restore OpenMU.AndroidServer.sln
        dotnet publish OpenMU.AndroidServer.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
