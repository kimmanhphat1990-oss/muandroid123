name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    # Hạ cấp hệ điều hành máy chủ Actions từ ubuntu-latest xuống ubuntu-20.04 để lấy bộ công cụ NDK cũ
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Old Java JDK Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          # Chuyển đổi từ Java 17 xuống Java 11 để khớp với cấu trúc Gradle đời cũ của game
          java-version: '11'

      - name: Setup Legacy Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Legacy Android APK
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Thực hiện lệnh dọn dẹp hệ thống cũ và tiến hành biên dịch ra file APK cài đặt
          ./gradlew clean assembleRelease --no-daemon

      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
