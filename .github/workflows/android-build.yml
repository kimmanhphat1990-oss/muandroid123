name: Compile MU Mobile C++ APK Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - name: Step 1: Checkout Source Code
      uses: actions/checkout@v4

    - name: Step 2: Setup Java JDK Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Step 3: Setup Android NDK & Toolchains
      uses: android-actions/setup-android@v3

    - name: Step 4: Grant Permissions and Build Pure Android APK
      run: |
        # Di chuyển vào đúng thư mục dự án Android chứa file Gradle để kích hoạt build
        cd android/ || cd */android/ || true
        chmod +x gradlew || true
        ./gradlew assembleRelease --no-daemon
        
    - name: Step 5: Upload Released Game APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MU-Online-Classic-Client
        path: |
          **/*.apk
