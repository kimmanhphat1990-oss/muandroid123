name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      # Ép buộc máy chủ ảo cài đặt cố định phiên bản Gradle 8.5 để tương thích với game cũ
      - name: Setup Legacy Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Patch Gradle and NDK Configurations
        run: |
          cd android/ || cd */android/ || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          find . -name "build.gradle" -exec sed -i '/ndkVersion/d' {} +
          echo "=== ĐÃ ĐỒNG BỘ HOÀN TOÀN FILE CẤU HÌNH ==="

      - name: Build Android APK via Target Gradle
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Sử dụng lệnh gọi gradle trực tiếp từ hệ thống thay vì dùng gradlew wrapper cũ lỗi
          gradle clean assembleRelease -x test --continue --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
