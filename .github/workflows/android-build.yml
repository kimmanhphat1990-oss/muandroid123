name: Audit Project Structure
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  audit-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Scan and List All Files
        run: |
          echo "=== TOÀN BỘ CẤU TRÚC THƯ MỤC TRONG REPO CỦA BẠN ==="
          find . -maxdepth 3 -not -path '*/.*'
          
          echo -e "\n=== TÌM VỊ TRÍ CHÍNH XÁC CỦA CÁC FILE GRADLE ==="
          find . -name "build.gradle"
          
          echo -e "\n=== TÌM VỊ TRÍ CHÍNH XÁC CỦA CÁC FILE CMAKE (C++) ==="
          find . -name "CMakeLists.txt"
          
