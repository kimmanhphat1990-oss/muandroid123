name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      - name: Build Android APK
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Ép Gradle bỏ qua kiểm tra lỗi cảnh báo tương thích cũ để xuất xưởng APK thành công
          ./gradlew assembleRelease -x test --continue --no-daemon

      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
