name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Brand New Solution
      run: |
        # 1. Xóa bỏ triệt để mọi file giải pháp lỗi cũ
        rm -rf *.sln *.slnx muandroid123/ ServerBuild/
        
        # 2. Ép buộc tạo file sln trực tiếp tại thư mục gốc bằng tham số đầu ra -o
        dotnet new sln -n ServerBuild -o . --force
        
        # 3. Quét động và nạp chính xác các phân hệ vào tệp giải pháp nằm tại gốc
        find . -name "*.csproj" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          echo "Mapping project: $project"
          dotnet sln ServerBuild.sln add "$project"
        done
    - name: Restore and Compile Server
      run: |
        dotnet restore ServerBuild.sln
        dotnet publish ServerBuild.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
