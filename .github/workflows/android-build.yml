name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      - name: Setup Target Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'
          cache-disabled: true # Ép tắt hoàn toàn tính năng lưu cache của Action này

      - name: Pure Clean, Download NDK and Configure Paths
        run: |
          # 1. Xóa sạch mọi thư mục build cũ dính cache file rỗng 4KB cũ
          find . -type d \( -name ".gradle" -o -name ".cxx" -o -name "build" -o -name "outputs" \) -exec rm -rf {} +
          
          # 2. Cài đặt phiên bản NDK 25.2.9519653 chuẩn
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          
          # 3. Nạp đường dẫn SDK/NDK chuẩn vào thư mục dự án thật
          REAL_ANDROID_DIR="Mu-Online-CrossPlataform-main/android"
          echo "sdk.dir=$ANDROID_HOME" > "$REAL_ANDROID_DIR/local.properties"
          echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> "$REAL_ANDROID_DIR/local.properties"
          
          echo "=== ĐÃ DỌN SẠCH CŨ, TẢI MỚI NDK THÀNH CÔNG ==="

      - name: Build Android APK via Inner Gradle
        run: |
          cd Mu-Online-CrossPlataform-main/android
          chmod +x gradlew
          
          # Ép Gradle phải tự tay biên dịch lại từng file C++/Java từ đầu, không lấy đệm cũ
          ./gradlew assembleDebug --no-daemon --no-build-cache
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "Mu-Online-CrossPlataform-main/android/app/build/outputs/apk/debug/*.apk"
          
