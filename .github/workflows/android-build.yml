name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Clean Solution and Restore
      run: |
        dotnet new sln -n MUnique.OpenMU
        find . -name "*.csproj" -exec dotnet sln MUnique.OpenMU.sln add {} +
        dotnet restore MUnique.OpenMU.sln
    - name: Compile and Publish Server
      run: |
        dotnet publish MUnique.OpenMU.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
