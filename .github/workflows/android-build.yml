name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Hardcoded Solution
      run: |
        dotnet new sln -n MUnique.OpenMU
        
        # Nạp đích danh từng dự án con cốt lõi dựa trên danh sách Namespace bị thiếu
        dotnet sln MUnique.OpenMU.sln add Startup/MUnique.OpenMU.Startup.csproj || true
        dotnet sln MUnique.OpenMU.sln add ConnectServer/MUnique.OpenMU.ConnectServer.csproj || true
        dotnet sln MUnique.OpenMU.sln add LoginServer/MUnique.OpenMU.LoginServer.csproj || true
        dotnet sln MUnique.OpenMU.sln add GuildServer/MUnique.OpenMU.GuildServer.csproj || true
        dotnet sln MUnique.OpenMU.sln add FriendServer/MUnique.OpenMU.FriendServer.csproj || true
        dotnet sln MUnique.OpenMU.sln add ChatServer/MUnique.OpenMU.ChatServer.csproj || true
        dotnet sln MUnique.OpenMU.sln add Web/MUnique.OpenMU.Web.csproj || true
        dotnet sln MUnique.OpenMU.sln add Persistence/MUnique.OpenMU.Persistence.csproj || true
        
    - name: Restore and Compile Server
      run: |
        dotnet restore MUnique.OpenMU.sln
        dotnet publish MUnique.OpenMU.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
