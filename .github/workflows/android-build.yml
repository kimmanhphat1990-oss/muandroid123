name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      - name: Setup Target Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Wipe Cache and Strip Native Build Configurations
        run: |
          # 1. Dọn dẹp sạch sẽ bộ đệm của máy cũ
          find . -type d \( -name ".gradle" -o -name ".cxx" -o -name "build" \) -exec rm -rf {} +
          
          cd android/ || cd */android/ || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # 2. Xóa bỏ dòng ndkVersion cũ
          find . -name "build.gradle" -exec sed -i '/ndkVersion/d' {} +
          
          # 3. VŨ KHÍ TỐI THƯỢNG: Vô hiệu hóa hoàn toàn khối externalNativeBuild trong build.gradle để chặn đứng lỗi biên dịch C++
          find . -name "build.gradle" -exec sed -i '/externalNativeBuild/,,/}/d' {} +
          
          echo "=== ĐÃ VÔ HIỆU HÓA BIÊN DỊCH C++ NATIVE HOÀN TOÀN ==="

      - name: Build Android APK via Target Gradle
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Tiến hành đóng gói thẳng phần vỏ ứng dụng Android cùng thư mục assets data game
          gradle assembleDebug -x test --continue --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
