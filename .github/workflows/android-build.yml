name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Hardcoded Solution
      run: |
        dotnet new sln -n MUnique.OpenMU
        
        # Nạp chính xác danh sách các dự án cốt lõi (Đã loại bỏ hoàn toàn ChatServer)
        dotnet sln MUnique.OpenMU.sln add Startup/MUnique.OpenMU.Startup.csproj
        dotnet sln MUnique.OpenMU.sln add ConnectServer/MUnique.OpenMU.ConnectServer.csproj
        dotnet sln MUnique.OpenMU.sln add LoginServer/MUnique.OpenMU.LoginServer.csproj
        dotnet sln MUnique.OpenMU.sln add GuildServer/MUnique.OpenMU.GuildServer.csproj
        dotnet sln MUnique.OpenMU.sln add FriendServer/MUnique.OpenMU.FriendServer.csproj
        dotnet sln MUnique.OpenMU.sln add GameServer/MUnique.OpenMU.GameServer.csproj
        
        # Nạp các phân hệ dữ liệu, mạng và logic phụ thuộc
        dotnet sln MUnique.OpenMU.sln add Persistence/EntityFramework/MUnique.OpenMU.Persistence.EntityFramework.csproj
        dotnet sln MUnique.OpenMU.sln add Persistence/MUnique.OpenMU.Persistence.csproj
        dotnet sln MUnique.OpenMU.sln add DataModel/MUnique.OpenMU.DataModel.csproj
        dotnet sln MUnique.OpenMU.sln add Network/MUnique.OpenMU.Network.csproj
        dotnet sln MUnique.OpenMU.sln add GameLogic/MUnique.OpenMU.GameLogic.csproj
        dotnet sln MUnique.OpenMU.sln add Interfaces/MUnique.OpenMU.Interfaces.csproj
        
    - name: Restore and Compile Server
      run: |
        dotnet restore MUnique.OpenMU.sln
        dotnet publish MUnique.OpenMU.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
