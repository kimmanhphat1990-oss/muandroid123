name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Brand New Solution
      run: |
        # 1. Xóa sạch mọi tệp tin giải pháp cũ lỗi
        rm -rf *.sln *.slnx
        
        # 2. Tạo một file thô tại gốc để khóa vị trí không cho .NET tự đẻ thư mục con
        echo 'Microsoft Visual Studio Solution File, Format Version 12.00' > ServerBuild.sln
        
        # 3. Quét động và nạp chính xác các phân hệ vào tệp giải pháp đã khóa vị trí tại gốc
        find . -name "*.csproj" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          echo "Mapping project: $project"
          dotnet sln ServerBuild.sln add "$project"
        done
    - name: Restore and Compile Server
      run: |
        dotnet restore ServerBuild.sln
        dotnet publish ServerBuild.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
