name: build-server-and-ape

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

        with:
          dotnet-version: '10.0.x'

      - name: Restore All Projects
        run: dotnet restore Startup/MUnique.OpenMU.Startup.csproj

      - name: Build and Publish Server
        run: dotnet publish Startup/MUnique.OpenMU.Startup.csproj -c Release -o ./ServerOut/ -p:BuildProjectReferences=true /p:GenerateAssemblyInfo=false