name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      - name: Setup Target Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Wipe Legacy Mac Cache and Fix Configurations
        run: |
          find . -type d \( -name ".gradle" -o -name ".cxx" -o -name "build" \) -exec rm -rf {} +
          cd android/ || cd */android/ || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          find . -name "build.gradle" -exec sed -i '/ndkVersion/d' {} +
          echo "=== ĐÃ DỌN SẠCH MÔI TRƯỜNG BIÊN DỊCH ==="

      - name: Build Android APK via Target Gradle
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # CHUYỂN ĐỔI CHIẾN THUẬT: Đổi sang assembleDebug để bỏ qua xác thực chữ ký Keystore, ép xuất xưởng APK luôn
          gradle assembleDebug -x test --continue --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
