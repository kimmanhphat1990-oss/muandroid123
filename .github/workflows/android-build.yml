name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Brand New Solution
      run: |
        rm -rf *.sln *.slnx
        echo 'Microsoft Visual Studio Solution File, Format Version 12.00' > ServerBuild.sln
        find . -name "*.csproj" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          dotnet sln ServerBuild.sln add "$project"
        done
        
    - name: Inject Project References to Startup
      run: |
        # Tự động chèn ép liên kết tất cả các phân hệ phụ thuộc vào thẳng tệp cấu hình Startup.csproj
        sed -i '/<\/Project>/i \  <ItemGroup>\n    <ProjectReference Include="..\\ConnectServer\\MUnique.OpenMU.ConnectServer.csproj" />\n    <ProjectReference Include="..\\LoginServer\\MUnique.OpenMU.LoginServer.csproj" />\n    <ProjectReference Include="..\\GuildServer\\MUnique.OpenMU.GuildServer.csproj" />\n    <ProjectReference Include="..\\FriendServer\\MUnique.OpenMU.FriendServer.csproj" />\n    <ProjectReference Include="..\\GameServer\\MUnique.OpenMU.GameServer.csproj" />\n    <ProjectReference Include="..\\Persistence\\EntityFramework\\MUnique.OpenMU.Persistence.EntityFramework.csproj" />\n    <ProjectReference Include="..\\Web\\MUnique.OpenMU.Web.csproj" />\n  </ItemGroup>' Startup/MUnique.OpenMU.Startup.csproj

    - name: Restore and Compile Server
      run: |
        dotnet restore ServerBuild.sln
        dotnet publish ServerBuild.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
