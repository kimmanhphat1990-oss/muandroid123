name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      - name: Setup Target Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Configure Android Local SDK and Local Properties
        run: |
          # 1. Dọn dẹp sạch sẽ bộ đệm của máy ảo trực tuyến
          find . -type d \( -name ".gradle" -o -name ".cxx" -o -name "build" \) -exec rm -rf {} +
          
          # 2. Tạo file định danh cấu hình đường dẫn SDK chuẩn chỉnh cho Android Studio
          find . -name "build.gradle" | while read -r gradle_file; do
            dir_path=$(dirname "$gradle_file")
            echo "sdk.dir=$ANDROID_HOME" > "$dir_path/local.properties"
          done
          echo "=== ĐÃ ĐỒNG BỘ ĐƯỜNG DẪN SDK THÀNH CÔNG ==="

      - name: Build Android APK via Target Gradle
        run: |
          # 1. Tìm chính xác thư mục chứa công cụ thực thi đóng gói gradlew trong mã nguồn
          GRADLEW_DIR=$(find . -name "gradlew" | head -n 1 | sed 's|/gradlew||')
          cd "$GRADLEW_DIR" || cd android || true
          chmod +x gradlew || true
          
          # 2. Tiến hành chạy lệnh đóng gói APK bản Debug kèm nạp dữ liệu Assets
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
          
