name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      - name: Setup Target Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Download NDK and Configure SDK/NDK Path
        run: |
          # 1. Cài đặt phiên bản NDK 25.2.9519653 bằng sdkmanager của hệ thống
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          
          # 2. Định vị thư mục dự án thật
          REAL_ANDROID_DIR="Mu-Online-CrossPlataform-main/android"
          
          # 3. Tạo file cấu hình local.properties nạp trực tiếp đường dẫn SDK và NDK vừa tải
          echo "sdk.dir=$ANDROID_HOME" > "$REAL_ANDROID_DIR/local.properties"
          echo "ndk.dir=$ANDROID_HOME/ndk/25.2.9519653" >> "$REAL_ANDROID_DIR/local.properties"
          
          echo "=== ĐÃ CÀI ĐẶT NDK VÀ ĐỒNG BỘ ĐƯỜNG DẪN THÀNH CÔNG ==="

      - name: Build Android APK via Inner Gradle
        run: |
          # Di chuyển vào thư mục chứa mã nguồn game thật
          cd Mu-Online-CrossPlataform-main/android
          
          # Cấp quyền thực thi và tiến hành biên dịch đóng gói toàn bộ mã nguồn
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "Mu-Online-CrossPlataform-main/android/app/build/outputs/apk/debug/*.apk"
          
