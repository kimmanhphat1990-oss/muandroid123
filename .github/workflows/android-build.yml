name: Android Server Build Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Step 1: Checkout Source Code
      uses: actions/checkout@v4

    - name: Step 2: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Step 3: Recreate Clean Solution and Restore
      run: |
        dotnet new sln -n MUnique.OpenMU
        dotnet sln MUnique.OpenMU.sln add **/*.csproj
        dotnet restore MUnique.OpenMU.sln

    - name: Step 4: Compile and Publish Server
      run: |
        dotnet publish MUnique.OpenMU.sln \
          -c Release \
          -o ./ServerOut/ \
          --no-restore \
          -p:GenerateAssemblyInfo=false \
          -p:Deterministic=false
