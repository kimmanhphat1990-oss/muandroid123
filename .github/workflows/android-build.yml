name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Recreate Clean Solution and Map Projects
      run: |
        # 1. Tạo tệp giải pháp mới với định dạng chuẩn
        dotnet new sln -n MUnique.OpenMU --force
        
        # 2. Quét động và nạp chính xác các phân hệ hợp lệ bằng vòng lặp chống khoảng trắng
        find . -name "*.csproj" ! -path "*/Backup/*" ! -path "*/bin/*" ! -path "*/obj/*" ! -path "*/ChatServer/*" | while read -r project; do
          echo "Mapping project: $project"
          dotnet sln MUnique.OpenMU.sln add "$project"
        done
    - name: Restore and Compile Server
      run: |
        dotnet restore MUnique.OpenMU.sln
        dotnet publish MUnique.OpenMU.sln -c Release -o ./ServerOut/ --no-restore -p:GenerateAssemblyInfo=false -p:Deterministic=false
