name: Android Server Build Workflow
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Pre-compile All Sub-Projects
      run: |
        # Ép .NET biên dịch riêng lẻ từng phân hệ để sinh cache thư viện
        dotnet build ConnectServer/MUnique.OpenMU.ConnectServer.csproj -c Release -p:GenerateAssemblyInfo=false
        dotnet build LoginServer/MUnique.OpenMU.LoginServer.csproj -c Release -p:GenerateAssemblyInfo=false
        dotnet build GuildServer/MUnique.OpenMU.GuildServer.csproj -c Release -p:GenerateAssemblyInfo=false
        dotnet build FriendServer/MUnique.OpenMU.FriendServer.csproj -c Release -p:GenerateAssemblyInfo=false
        dotnet build GameServer/MUnique.OpenMU.GameServer.csproj -c Release -p:GenerateAssemblyInfo=false
        dotnet build Persistence/EntityFramework/MUnique.OpenMU.Persistence.EntityFramework.csproj -c Release -p:GenerateAssemblyInfo=false
        
    - name: Compile and Publish Main Server
      run: |
        # Biên dịch dự án chính kèm theo lệnh ép buộc nạp tất cả các tham chiếu chéo
        dotnet publish Startup/MUnique.OpenMU.Startup.csproj \
          -c Release \
          -o ./ServerOut/ \
          -p:BuildProjectReferences=true \
          -p:GenerateAssemblyInfo=false \
          -p:Deterministic=false
