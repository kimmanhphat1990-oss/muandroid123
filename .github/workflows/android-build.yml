name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android Toolchains
        uses: android-actions/setup-android@v3

      # Nâng cấp và khóa cứng phiên bản Gradle lên đúng 8.13 để khớp với plugin Android của game
      - name: Setup Target Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.13'

      - name: Patch Gradle and NDK Configurations
        run: |
          cd android/ || cd */android/ || true
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          find . -name "build.gradle" -exec sed -i '/ndkVersion/d' {} +
          echo "=== ĐÃ ĐỒNG BỘ HOÀN TOÀN FILE CẤU HÌNH VỚI GRADLE 8.13 ==="

      - name: Build Android APK via Target Gradle
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Thực hiện dọn dẹp bộ đệm lỗi cũ và tiến hành biên dịch dứt điểm sang file APK
          gradle clean assembleRelease -x test --continue --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
