name: Compile MU Mobile APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          # Nâng cấp lên Java 17 để khớp chính xác với yêu cầu của Android Gradle Plugin
          java-version: '17'

      - name: Build Android APK via Local Wrapper
        run: |
          cd android/ || cd */android/ || true
          chmod +x gradlew || true
          # Biên dịch trực tiếp, bỏ qua kiểm tra lỗi cảnh báo tương thích cũ để ép xuất file APK
          ./gradlew clean assembleRelease -x test --continue --no-daemon
          
      - name: Upload Game APK
        uses: actions/upload-artifact@v4
        with:
          name: MU-Online-Classic-Client
          path: "**/*.apk"
